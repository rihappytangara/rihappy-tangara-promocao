<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadastro de Cupons</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topo">

    <img
        src="assets/logo.png"
        class="logo"
        alt="Logo"
    >

    <h1>Cadastro de Cupons</h1>

    <img
        src="assets/promo.png"
        class="banner-promo"
        alt="Promoção"
    >
</header>
<form id="cadastro">

    <input
    id="cpf"
    placeholder="CPF (ex: 123.456.789-00)"
    maxlength="14"
    required
>

    <input id="nome" placeholder="Nome Completo" required>

    <input
    id="telefone"
    placeholder="Telefone (ex: (11) 99999-9999)"
    maxlength="15"
    required
>

    <input
    id="valor"
    placeholder="Valor da Compra (R$)"
    maxlength="9"
    required
>

    <input id="cupom" placeholder="Número do Cupom" required>

    <select id="pdv" required>
        <option value="">Selecione o PDV</option>
        <option value="1">PDV 1</option>
        <option value="2">PDV 2</option>
    </select>

    <button type="submit">
        Cadastrar Cupom
    </button>
    <button
    type="button"
    onclick="window.location.href='consulta.html'">
    Consultar Números da Sorte
    </button>
</form>

<div id="resultado"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/cadastro.js"></script>
</body>
</html>
