<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Acesso Administrativo</title>

<link rel="stylesheet" href="css/style.css">

<style>

.login-box{
    max-width:400px;
    margin:60px auto;
    padding:30px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    box-sizing:border-box;
}

.login-box button{
    width:100%;
}

</style>

</head>

<body>

<header>
    <img src="assets/logo.png" height="120">
    <h1>Painel Administrativo</h1>
</header>

<div class="login-box">

    <h2>Acesso Restrito</h2>

    <input
        type="password"
        id="senha"
        placeholder="Digite a senha"
    >

    <button id="entrar">
        Entrar
    </button>

    <br><br>

    <button onclick="location.href='index.html'">
        Voltar
    </button>

</div>

<script src="js/admin.js"></script>

</body>
</html>
